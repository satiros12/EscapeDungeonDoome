<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDoom - FPS Melee</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #menu, #victory, #defeat {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: #fff; font-family: 'Courier New', monospace;
        }
        #menu h1 { font-size: 4rem; color: #ff0000; text-shadow: 0 0 20px #ff0000; margin-bottom: 2rem; }
        .btn {
            padding: 1rem 3rem; font-size: 1.5rem; background: #ff0000; color: #fff;
            border: none; cursor: pointer; font-family: inherit; pointer-events: auto;
            transition: transform 0.1s;
        }
        .btn:hover { transform: scale(1.1); }
        .btn:focus { outline: 3px solid #fff; outline-offset: 2px; }
        #hud {
            position: absolute; bottom: 20px; left: 20px;
            font-family: 'Courier New', monospace; color: #fff; font-size: 1.2rem;
        }
        #health-bar { width: 200px; height: 20px; background: #333; border: 2px solid #fff; }
        #health-fill { height: 100%; background: #00ff00; transition: width 0.2s; }
        #damage-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,0,0,0.5); pointer-events: none; opacity: 0;
        }
        .hidden { display: none !important; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: #fff;
        }
        #crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
        #crosshair::after { width: 20px; height: 2px; left: 0; top: 9px; }
        #kill-count {
            position: absolute; top: 20px; right: 20px;
            font-family: 'Courier New', monospace; color: #fff; font-size: 1.2rem;
        }
        #fps-counter {
            position: absolute; top: 20px; left: 20px;
            font-family: 'Courier New', monospace; color: #0f0; font-size: 1rem;
        }
        #connection-status {
            position: absolute; top: 50px; left: 20px;
            font-family: 'Courier New', monospace; color: #f00; font-size: 0.8rem;
        }
        #connection-status.connected { color: #0f0; }
        #console {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 200px;
            background: rgba(0,0,0,0.9); color: #0f0; font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; border-top: 2px solid #0f0;
            pointer-events: auto;
        }
        #console-header {
            padding: 5px 10px; background: #0f0; color: #000; font-size: 0.9rem;
        }
        #console-output {
            flex: 1; overflow-y: auto; padding: 10px; font-size: 0.9rem;
        }
        #console-output .error { color: #f00; }
        #console-output .info { color: #0ff; }
        #console-output .success { color: #0f0; }
        #console-input {
            width: 100%; padding: 10px; background: #111; color: #0f0;
            border: none; border-top: 1px solid #0f0; font-family: inherit; font-size: 1rem;
            outline: none;
        }
        #pause {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: #fff; font-family: 'Courier New', monospace;
        }
        #pause h1 { font-size: 4rem; color: #ffff00; text-shadow: 0 0 20px #ffff00; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui">
        <div id="menu">
            <h1>WEBDOOM</h1>
            <button class="btn" id="startBtn">COMENZAR</button>
        </div>
        <div id="victory" class="hidden">
            <h1 style="color: #00ff00;">VICTORIA</h1>
            <p style="font-size: 1.5rem; margin: 1rem;">Has eliminado a todos los enemigos</p>
            <button class="btn" id="victoryBtn">VOLVER AL MENÚ</button>
        </div>
        <div id="defeat" class="hidden">
            <h1 style="color: #ff0000;">DERROTA</h1>
            <p style="font-size: 1.5rem; margin: 1rem;">Has muerto</p>
            <button class="btn" id="defeatBtn">VOLVER AL MENÚ</button>
        </div>
        <div id="hud" class="hidden">
            <div id="health-label">VIDA</div>
            <div id="health-bar"><div id="health-fill" style="width: 100%;"></div></div>
        </div>
        <div id="kill-count" class="hidden">ENEMIGOS: <span id="kills">0</span>/3</div>
        <div id="fps-counter" class="hidden">FPS: --</div>
        <div id="connection-status" class="hidden">DESCONECTADO</div>
        <div id="crosshair" class="hidden"></div>
        <div id="console" class="hidden">
            <div id="console-header">CONSOLA (ALT+P para cerrar)</div>
            <div id="console-output"></div>
            <input type="text" id="console-input" placeholder="Escribe un comando..." autocomplete="off">
        </div>
        <div id="pause" class="hidden">
            <h1 style="color: #ffff00;">PAUSA</h1>
            <button class="btn" id="resumeBtn">REANUDAR</button>
            <button class="btn" id="pauseMenuBtn">MENÚ PRINCIPAL</button>
        </div>
        <div id="damage-flash"></div>
    </div>
    <script>
    const CONFIG = {
        FOV: Math.PI / 3,
        HALF_FOV: Math.PI / 6,
        NUM_RAYS: 320,
        MAX_DEPTH: 16,
        FOV_CULL: 0.2,
        RAY_STEP: 0.02,
        MIN_BRIGHTNESS: 0.3,
        WALL_COLOR_BASE: [255, 200, 180],
        WALL_COLOR_SIDE: [180, 160, 140],
        PLAYER_MAX_HEALTH: 100
    };

    const WS_URL = `ws://${window.location.hostname}:8001`;

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    if (!ctx) {
        document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:20%;font-family:sans-serif;">Error: Canvas 2D not supported</h1>';
        throw new Error('Canvas 2D context not available');
    }

    let SCREEN_WIDTH = window.innerWidth;
    let SCREEN_HEIGHT = window.innerHeight;
    const FOV = CONFIG.FOV;
    const HALF_FOV = CONFIG.HALF_FOV;
    const NUM_RAYS = CONFIG.NUM_RAYS;
    const MAX_DEPTH = CONFIG.MAX_DEPTH;

    const mapData = [
        "################",
        "#              #",
        "#   E    #     #",
        "#        #     #",
        "#      ###     #",
        "#      # P     #",
        "#          E   #",
        "#    ###      #",
        "#    #        #",
        "#    #    #   #",
        "#        #    #",
        "#   ###       #",
        "#          E  #",
        "#              #",
        "#              #",
        "################"
    ];

    const MAP_WIDTH = mapData[0].length;
    const MAP_HEIGHT = mapData.length;

    let gameState = 'menu';
    let consoleOpen = false;
    let paused = false;
    let player = { x: 1.5, y: 1.5, angle: 0, health: 100, attack_cooldown: 0 };
    let enemies = [];
    let corpses = [];
    let kills = 0;
    let hitEffects = [];
    let keys = {};
    let ws = null;
    let fps = 0;
    let frameCount = 0;
    let lastFpsTime = 0;

    function resizeCanvas() {
        SCREEN_WIDTH = window.innerWidth;
        SCREEN_HEIGHT = window.innerHeight;
        canvas.width = SCREEN_WIDTH;
        canvas.height = SCREEN_HEIGHT;
    }

    function isWall(x, y) {
        const mx = Math.floor(x);
        const my = Math.floor(y);
        if (mx < 0 || mx >= MAP_WIDTH || my < 0 || my >= MAP_HEIGHT) return true;
        return mapData[my][mx] === '#';
    }

    function castRay(rayAngle) {
        let sin = Math.sin(rayAngle);
        let cos = Math.cos(rayAngle);
        if (Math.abs(sin) < 0.0001) sin = 0.0001;
        if (Math.abs(cos) < 0.0001) cos = 0.0001;

        let dist = 0;
        const step = CONFIG.RAY_STEP;
        while (dist < MAX_DEPTH) {
            dist += step;
            const testX = player.x + cos * dist;
            const testY = player.y + sin * dist;
            if (isWall(testX, testY)) {
                let side = 0;
                const mx = Math.floor(testX);
                const my = Math.floor(testY);
                if (mx !== Math.floor(player.x + cos * (dist - step))) side = 1;
                return { dist, side };
            }
        }
        return { dist: MAX_DEPTH, side: 0 };
    }

    function renderWalls() {
        const stripWidth = SCREEN_WIDTH / NUM_RAYS;
        for (let i = 0; i < NUM_RAYS; i++) {
            const rayAngle = player.angle - HALF_FOV + (i / NUM_RAYS) * FOV;
            const { dist, side } = castRay(rayAngle);
            const correctedDist = dist * Math.cos(rayAngle - player.angle);
            const wallHeight = Math.min(SCREEN_HEIGHT * 2, SCREEN_HEIGHT / correctedDist);
            const brightness = Math.max(CONFIG.MIN_BRIGHTNESS, 1 - correctedDist / MAX_DEPTH);
            const color = side === 0 
                ? [brightness * CONFIG.WALL_COLOR_BASE[0], brightness * CONFIG.WALL_COLOR_BASE[1], brightness * CONFIG.WALL_COLOR_BASE[2]] 
                : [brightness * CONFIG.WALL_COLOR_SIDE[0], brightness * CONFIG.WALL_COLOR_SIDE[1], brightness * CONFIG.WALL_COLOR_SIDE[2]];
            ctx.fillStyle = `rgb(${color[0]},${color[1]},${color[2]})`;
            ctx.fillRect(i * stripWidth, (SCREEN_HEIGHT - wallHeight) / 2, stripWidth + 1, wallHeight);
        }
    }

    function renderFloor() {
        const gradient = ctx.createLinearGradient(0, SCREEN_HEIGHT / 2, 0, SCREEN_HEIGHT);
        gradient.addColorStop(0, '#1a1a1a');
        gradient.addColorStop(1, '#0a0a0a');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, SCREEN_HEIGHT / 2, SCREEN_WIDTH, SCREEN_HEIGHT / 2);
    }

    function renderCeiling() {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT / 2);
    }

    function normalizeAngle(angle) {
        while (angle > Math.PI) angle -= Math.PI * 2;
        while (angle < -Math.PI) angle += Math.PI * 2;
        return angle;
    }

    function renderSprites() {
        const sprites = [];

        enemies.forEach(enemy => {
            if (enemy.state === 'dead') return;
            const dx = enemy.x - player.x;
            const dy = enemy.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angleToEnemy = Math.atan2(dy, dx);
            let angleDiff = normalizeAngle(angleToEnemy - player.angle);
            if (Math.abs(angleDiff) < HALF_FOV + CONFIG.FOV_CULL && dist < MAX_DEPTH) {
                sprites.push({ ...enemy, dist, angleDiff, isEnemy: true });
            }
        });

        corpses.forEach(corpse => {
            const dx = corpse.x - player.x;
            const dy = corpse.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angleToCorpse = Math.atan2(dy, dx);
            const angleDiff = normalizeAngle(angleToCorpse - player.angle);
            if (Math.abs(angleDiff) < HALF_FOV + CONFIG.FOV_CULL && dist < MAX_DEPTH) {
                sprites.push({ x: corpse.x, y: corpse.y, dist, angleDiff, isEnemy: false, isCorpse: true });
            }
        });

        sprites.sort((a, b) => b.dist - a.dist);

        sprites.forEach(sprite => {
            const screenX = SCREEN_WIDTH / 2 + (sprite.angleDiff / HALF_FOV) * (SCREEN_WIDTH / 2);
            const size = Math.min(400, SCREEN_HEIGHT / sprite.dist * 0.6);
            const screenY = SCREEN_HEIGHT / 2;

            if (sprite.isCorpse) {
                ctx.fillStyle = '#440000';
                ctx.beginPath();
                ctx.arc(screenX, screenY + size * 0.3, size / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#220000';
                ctx.fillRect(screenX - size / 2, screenY, size, size / 4);
            } else if (sprite.state === 'dying') {
                const alpha = 1 - sprite.dying_progress;
                ctx.fillStyle = `rgba(102, 0, 0, ${alpha})`;
                ctx.beginPath();
                ctx.arc(screenX, screenY, size / 2 * (1 + sprite.dying_progress * 0.3), 0, Math.PI * 2);
                ctx.fill();
            } else {
                const color = sprite.state === 'chase' || sprite.state === 'attack' ? '#ff2222' : '#aa3333';
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(screenX, screenY, size / 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(screenX - size / 6, screenY - size / 6, size / 10, 0, Math.PI * 2);
                ctx.fill();

                if (sprite.state === 'attack') {
                    ctx.fillStyle = '#ff0000';
                    ctx.beginPath();
                    ctx.moveTo(screenX + size / 2, screenY);
                    ctx.lineTo(screenX + size / 2 + 20, screenY - 10);
                    ctx.lineTo(screenX + size / 2 + 20, screenY + 10);
                    ctx.fill();
                }
            }
        });
    }

    function showDamageFlash() {
        const flash = document.getElementById('damage-flash');
        flash.style.opacity = 1;
        setTimeout(() => flash.style.opacity = 0, 150);
    }

    function updateHUD() {
        const fill = document.getElementById('health-fill');
        fill.style.width = Math.max(0, player.health) + '%';
        fill.style.background = player.health > 50 ? '#00ff00' : player.health > 25 ? '#ffff00' : '#ff0000';
    }

    function renderHitEffects() {
        hitEffects.forEach(effect => {
            const dx = effect.x - player.x;
            const dy = effect.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angleToEffect = Math.atan2(dy, dx);
            const angleDiff = normalizeAngle(angleToEffect - player.angle);
            if (Math.abs(angleDiff) < HALF_FOV + CONFIG.FOV_CULL && dist < MAX_DEPTH) {
                const screenX = SCREEN_WIDTH / 2 + (angleDiff / HALF_FOV) * (SCREEN_WIDTH / 2);
                const size = Math.min(100, SCREEN_HEIGHT / dist * 0.15);
                const screenY = SCREEN_HEIGHT / 2;
                const alpha = effect.timer / 0.3;
                ctx.strokeStyle = `rgba(255, 255, 0, ${alpha})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(screenX, screenY, size, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = `rgba(255, 255, 0, ${alpha})`;
                ctx.font = `${size}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('HIT!', screenX, screenY - size - 5);
            }
        });
    }

    function render(timestamp) {
        updateFPS(timestamp);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
        renderCeiling();
        renderFloor();
        renderWalls();
        renderSprites();
        renderHitEffects();
        updateHUD();
        requestAnimationFrame(render);
    }

    function updateFPS(timestamp) {
        frameCount++;
        if (timestamp - lastFpsTime >= 1000) {
            fps = frameCount;
            frameCount = 0;
            lastFpsTime = timestamp;
            const fpsEl = document.getElementById('fps-counter');
            if (fpsEl) fpsEl.textContent = `FPS: ${fps}`;
        }
    }

    function updateUI() {
        document.getElementById('kills').textContent = kills !== undefined ? kills : 0;
        
        if (player.health < CONFIG.PLAYER_MAX_HEALTH && player.health > 0) {
            const prevHealth = player.health;
            setTimeout(() => {
                if (player.health < prevHealth) {
                    showDamageFlash();
                }
            }, 50);
        }
    }

    function showScreen(screenId) {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('victory').classList.add('hidden');
        document.getElementById('defeat').classList.add('hidden');
        document.getElementById('pause').classList.add('hidden');
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('crosshair').classList.add('hidden');
        document.getElementById('kill-count').classList.add('hidden');
        document.getElementById('fps-counter').classList.add('hidden');
        
        if (screenId && screenId !== 'none') {
            document.getElementById(screenId).classList.remove('hidden');
        }
    }

    function connectWebSocket() {
        const statusEl = document.getElementById('connection-status');
        
        try {
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                console.log('Connected to server');
                statusEl.textContent = 'CONECTADO';
                statusEl.classList.add('connected');
                statusEl.classList.remove('hidden');
                // Request initial state
                ws.send(JSON.stringify({ type: 'get_state' }));
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.game_state !== undefined) {
                        gameState = data.game_state;
                        player = data.player || player;
                        enemies = data.enemies || enemies;
                        corpses = data.corpses || corpses;
                        kills = data.kills || kills;
                        hitEffects = data.hit_effects || hitEffects;
                        
                        updateUI();
                        
                        if (paused) {
                            return;
                        }
                        
                        if (gameState === 'menu') {
                            showScreen('menu');
                        } else if (gameState === 'playing') {
                            showScreen('none');
                            document.getElementById('hud').classList.remove('hidden');
                            document.getElementById('crosshair').classList.remove('hidden');
                            document.getElementById('kill-count').classList.remove('hidden');
                            document.getElementById('fps-counter').classList.remove('hidden');
                        } else if (gameState === 'victory') {
                            showScreen('victory');
                        } else if (gameState === 'defeat') {
                            showScreen('defeat');
                        }
                    }
                } catch (e) {
                    console.error('Error parsing state:', e);
                }
            };
            
            ws.onclose = () => {
                console.log('Disconnected from server');
                statusEl.textContent = 'DESCONECTADO';
                statusEl.classList.remove('connected');
                setTimeout(connectWebSocket, 2000);
            };
            
            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };
            
        } catch (e) {
            console.error('Failed to connect:', e);
            setTimeout(connectWebSocket, 2000);
        }
    }

    function sendInput() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'input', keys: keys }));
        }
    }

    function sendAttack() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'attack' }));
        }
    }

    function startGame() {
        paused = false;
        
        showScreen('none');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('crosshair').classList.remove('hidden');
        document.getElementById('kill-count').classList.remove('hidden');
        document.getElementById('fps-counter').classList.remove('hidden');
        
        console.log('startGame called, sending start to server');
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            if (gameState === 'menu') {
                ws.send(JSON.stringify({ type: 'start' }));
                console.log('Start message sent to server (new game)');
            } else {
                ws.send(JSON.stringify({ type: 'resume' }));
                console.log('Resume message sent to server');
            }
        } else {
            console.log('WebSocket not open, state:', ws ? ws.readyState : 'ws is null');
        }
    }

    function returnToMenu() {
        gameState = 'menu';
        paused = false;
        showScreen('menu');
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'menu' }));
        }
    }

    function toggleConsole() {
        consoleOpen = !consoleOpen;
        const consoleEl = document.getElementById('console');
        if (consoleOpen) {
            consoleEl.classList.remove('hidden');
            document.getElementById('console-input').focus();
            keys = {};
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'input', keys: {} }));
            }
        } else {
            consoleEl.classList.add('hidden');
            document.getElementById('console-input').blur();
        }
    }

    function logToConsole(msg, type = '') {
        const output = document.getElementById('console-output');
        const line = document.createElement('div');
        line.className = type;
        line.textContent = '> ' + msg;
        output.appendChild(line);
        output.scrollTop = output.scrollHeight;
    }

    function executeCommand(cmd) {
        const parts = cmd.trim().split(' ');
        const command = parts[0].toLowerCase();
        const args = parts.slice(1);

        logToConsole(cmd, 'info');

        switch (command) {
            case 'help':
                logToConsole('Comandos disponibles:', 'info');
                logToConsole('  help - Mostrar esta ayuda', 'success');
                logToConsole('  status - Mostrar estado del juego', 'success');
                logToConsole('  heal - Curar al jugador (100 HP)', 'success');
                logToConsole('  kill - Eliminar a todos los enemigos', 'success');
                logToConsole('  spawn <x> <y> - Spawnear enemigo en posición', 'success');
                logToConsole('  god - Alternar modo dios', 'success');
                logToConsole('  speed <n> - Establecer velocidad (1-10)', 'success');
                logToConsole('  clear - Limpiar consola', 'success');
                break;
            case 'status':
                logToConsole(`Estado: ${gameState}`, 'info');
                logToConsole(`Jugador: x=${player.x.toFixed(2)}, y=${player.y.toFixed(2)}, angle=${player.angle.toFixed(2)}, health=${player.health}`, 'info');
                logToConsole(`Enemigos: ${enemies.length}`, 'info');
                logToConsole(`Paused: ${paused}`, 'info');
                logToConsole(`Console: ${consoleOpen ? 'abierta' : 'cerrada'}`, 'info');
                break;
            case 'heal':
                player.health = 100;
                updateHUD();
                logToConsole('Jugador curado (100 HP)', 'success');
                break;
            case 'kill':
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'console_command', command: 'kill_all' }));
                    logToConsole('Enemigos eliminados', 'success');
                }
                break;
            case 'spawn':
                if (args.length >= 2) {
                    const x = parseFloat(args[0]);
                    const y = parseFloat(args[1]);
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'console_command', command: 'spawn', x, y }));
                        logToConsole(`Enemigo spawneado en (${x}, ${y})`, 'success');
                    }
                } else {
                    logToConsole('Uso: spawn <x> <y>', 'error');
                }
                break;
            case 'god':
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'console_command', command: 'god' }));
                    logToConsole('Modo dios activado', 'success');
                }
                break;
            case 'speed':
                if (args.length >= 1) {
                    const speed = parseFloat(args[0]);
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'console_command', command: 'speed', value: speed }));
                        logToConsole(`Velocidad establecida a ${speed}`, 'success');
                    }
                } else {
                    logToConsole('Uso: speed <n>', 'error');
                }
                break;
            case 'clear':
                document.getElementById('console-output').innerHTML = '';
                break;
            case '':
                break;
            default:
                logToConsole(`Comando desconocido: ${command}. Escribe "help" para ayuda.`, 'error');
        }
    }

    function pauseGame() {
        if (gameState === 'playing' && !paused && !consoleOpen) {
            paused = true;
            showScreen('pause');
            logToConsole('Juego pausado', 'info');
        }
    }

    function resumeGame() {
        if (paused) {
            paused = false;
            showScreen('none');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('crosshair').classList.remove('hidden');
            document.getElementById('kill-count').classList.remove('hidden');
            document.getElementById('fps-counter').classList.remove('hidden');
            logToConsole('Juego reanudado', 'info');
        }
    }

    document.addEventListener('keydown', e => {
        if (e.code === 'KeyP' && e.altKey) {
            e.preventDefault();
            toggleConsole();
            return;
        }

        if (consoleOpen) {
            return;
        }

        if (e.code === 'Escape' && gameState === 'playing') {
            e.preventDefault();
            pauseGame();
            return;
        }

        if (paused || gameState !== 'playing') {
            return;
        }

        keys[e.code] = true;
        sendInput();
        
        if (e.code === 'Space') {
            e.preventDefault();
            sendAttack();
        }
        if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
            e.preventDefault();
        }
    });

    document.addEventListener('keyup', e => {
        if (consoleOpen || paused || gameState !== 'playing') {
            return;
        }
        keys[e.code] = false;
        sendInput();
    });

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('victoryBtn').addEventListener('click', returnToMenu);
    document.getElementById('defeatBtn').addEventListener('click', returnToMenu);
    document.getElementById('resumeBtn').addEventListener('click', resumeGame);
    document.getElementById('pauseMenuBtn').addEventListener('click', returnToMenu);

    document.getElementById('console-input').addEventListener('keydown', function(e) {
        if (e.code === 'Enter') {
            const cmd = this.value;
            this.value = '';
            executeCommand(cmd);
        }
    });

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    showScreen('menu');
    connectWebSocket();
    requestAnimationFrame(render);
    </script>
</body>
</html>
