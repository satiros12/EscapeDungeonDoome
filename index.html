<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDoom - FPS Melee</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #menu, #victory, #defeat {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: #fff; font-family: 'Courier New', monospace;
        }
        #menu h1 { font-size: 4rem; color: #ff0000; text-shadow: 0 0 20px #ff0000; margin-bottom: 2rem; }
        .btn {
            padding: 1rem 3rem; font-size: 1.5rem; background: #ff0000; color: #fff;
            border: none; cursor: pointer; font-family: inherit; pointer-events: auto;
            transition: transform 0.1s;
        }
        .btn:hover { transform: scale(1.1); }
        #hud {
            position: absolute; bottom: 20px; left: 20px;
            font-family: 'Courier New', monospace; color: #fff; font-size: 1.2rem;
        }
        #health-bar { width: 200px; height: 20px; background: #333; border: 2px solid #fff; }
        #health-fill { height: 100%; background: #00ff00; transition: width 0.2s; }
        #damage-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,0,0,0.5); pointer-events: none; opacity: 0;
        }
        .hidden { display: none !important; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: #fff;
        }
        #crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
        #crosshair::after { width: 20px; height: 2px; left: 0; top: 9px; }
        #kill-count {
            position: absolute; top: 20px; right: 20px;
            font-family: 'Courier New', monospace; color: #fff; font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui">
        <div id="menu">
            <h1>WEBDOOM</h1>
            <button class="btn" id="startBtn">COMENZAR</button>
        </div>
        <div id="victory" class="hidden">
            <h1 style="color: #00ff00;">VICTORIA</h1>
            <p style="font-size: 1.5rem; margin: 1rem;">Has eliminado a todos los enemigos</p>
            <button class="btn" id="victoryBtn">VOLVER AL MENÚ</button>
        </div>
        <div id="defeat" class="hidden">
            <h1 style="color: #ff0000;">DERROTA</h1>
            <p style="font-size: 1.5rem; margin: 1rem;">Has muerto</p>
            <button class="btn" id="defeatBtn">VOLVER AL MENÚ</button>
        </div>
        <div id="hud" class="hidden">
            <div id="health-label">VIDA</div>
            <div id="health-bar"><div id="health-fill" style="width: 100%;"></div></div>
        </div>
        <div id="kill-count" class="hidden">ENEMIGOS: <span id="kills">0</span>/3</div>
        <div id="crosshair" class="hidden"></div>
        <div id="damage-flash"></div>
    </div>
    <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let SCREEN_WIDTH = window.innerWidth;
    let SCREEN_HEIGHT = window.innerHeight;
    const FOV = Math.PI / 3;
    const HALF_FOV = FOV / 2;
    const NUM_RAYS = 320;
    const MAX_DEPTH = 16;

    const MOVE_SPEED = 3;
    const ROT_SPEED = 2;
    const ATTACK_RANGE = 1.5;
    const ATTACK_COOLDOWN = 0.5;
    const ENEMY_SPEED = 2;
    const DETECTION_RANGE = 5;
    const DETECTION_ANGLE = Math.PI / 4;
    const ENEMY_ATTACK_RANGE = 1.3;
    const ENEMY_ATTACK_COOLDOWN = 1;

    const mapData = [
        "################",
        "#              #",
        "#              #",
        "#              #",
        "#      P  E    #",
        "#              #",
        "#              #",
        "#              #",
        "#              #",
        "#              #",
        "#              #",
        "#              #",
        "#              #",
        "#              #",
        "#              #",
        "################"
    ];

    const MAP_WIDTH = mapData[0].length;
    const MAP_HEIGHT = mapData.length;

    let gameState = 'menu';
    let player = { x: 1.5, y: 1.5, angle: 0, health: 100, attackCooldown: 0 };
    let enemies = [];
    let keys = {};
    let lastTime = 0;
    let corpses = [];
    let kills = 0;
    let hitEffects = [];

    function resizeCanvas() {
        SCREEN_WIDTH = window.innerWidth;
        SCREEN_HEIGHT = window.innerHeight;
        canvas.width = SCREEN_WIDTH;
        canvas.height = SCREEN_HEIGHT;
    }

    function parseMap() {
        player.x = 1.5; player.y = 1.5;
        enemies = [];
        corpses = [];
        kills = 0;
        document.getElementById('kills').textContent = '0';
        for (let y = 0; y < MAP_HEIGHT; y++) {
            for (let x = 0; x < MAP_WIDTH; x++) {
                const char = mapData[y][x];
                if (char === 'P') { player.x = x + 0.5; player.y = y + 0.5; }
                if (char === 'E') { 
                    enemies.push({ 
                        x: x + 0.5, y: y + 0.5, angle: Math.random() * Math.PI * 2, 
                        health: 30, state: 'patrol', 
                        patrolDir: Math.random() * Math.PI * 2, 
                        deathTimer: 0, attackCooldown: 0,
                        dyingProgress: 0
                    }); 
                }
            }
        }
    }

    function isWall(x, y) {
        const mx = Math.floor(x);
        const my = Math.floor(y);
        if (mx < 0 || mx >= MAP_WIDTH || my < 0 || my >= MAP_HEIGHT) return true;
        return mapData[my][mx] === '#';
    }

    function hasLineOfSight(x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const steps = Math.ceil(dist * 10);
        for (let i = 0; i < steps; i++) {
            const t = i / steps;
            if (isWall(x1 + dx * t, y1 + dy * t)) return false;
        }
        return true;
    }

    function castRay(rayAngle) {
        let sin = Math.sin(rayAngle);
        let cos = Math.cos(rayAngle);
        if (Math.abs(sin) < 0.0001) sin = 0.0001;
        if (Math.abs(cos) < 0.0001) cos = 0.0001;

        let dist = 0;
        const step = 0.02;
        while (dist < MAX_DEPTH) {
            dist += step;
            const testX = player.x + cos * dist;
            const testY = player.y + sin * dist;
            if (isWall(testX, testY)) {
                let side = 0;
                const mx = Math.floor(testX);
                const my = Math.floor(testY);
                if (mx !== Math.floor(player.x + cos * (dist - step))) side = 1;
                return { dist, side };
            }
        }
        return { dist: MAX_DEPTH, side: 0 };
    }

    function renderWalls() {
        const stripWidth = SCREEN_WIDTH / NUM_RAYS;
        for (let i = 0; i < NUM_RAYS; i++) {
            const rayAngle = player.angle - HALF_FOV + (i / NUM_RAYS) * FOV;
            const { dist, side } = castRay(rayAngle);
            const correctedDist = dist * Math.cos(rayAngle - player.angle);
            const wallHeight = Math.min(SCREEN_HEIGHT * 2, SCREEN_HEIGHT / correctedDist);
            const brightness = Math.max(0.3, 1 - correctedDist / MAX_DEPTH);
            const color = side === 0 ? [brightness * 255, brightness * 200, brightness * 180] : [brightness * 180, brightness * 160, brightness * 140];
            ctx.fillStyle = `rgb(${color[0]},${color[1]},${color[2]})`;
            ctx.fillRect(i * stripWidth, (SCREEN_HEIGHT - wallHeight) / 2, stripWidth + 1, wallHeight);
        }
    }

    function renderFloor() {
        const gradient = ctx.createLinearGradient(0, SCREEN_HEIGHT / 2, 0, SCREEN_HEIGHT);
        gradient.addColorStop(0, '#1a1a1a');
        gradient.addColorStop(1, '#0a0a0a');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, SCREEN_HEIGHT / 2, SCREEN_WIDTH, SCREEN_HEIGHT / 2);
    }

    function renderCeiling() {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT / 2);
    }

    function movePlayer(dt) {
        let moveX = 0, moveY = 0;
        if (keys['KeyW']) { moveX += Math.cos(player.angle) * MOVE_SPEED * dt; moveY += Math.sin(player.angle) * MOVE_SPEED * dt; }
        if (keys['KeyS']) { moveX -= Math.cos(player.angle) * MOVE_SPEED * dt; moveY -= Math.sin(player.angle) * MOVE_SPEED * dt; }
        if (keys['KeyA']) { moveX += Math.cos(player.angle - Math.PI / 2) * MOVE_SPEED * dt; moveY += Math.sin(player.angle - Math.PI / 2) * MOVE_SPEED * dt; }
        if (keys['KeyD']) { moveX += Math.cos(player.angle + Math.PI / 2) * MOVE_SPEED * dt; moveY += Math.sin(player.angle + Math.PI / 2) * MOVE_SPEED * dt; }
        if (keys['ArrowLeft']) player.angle -= ROT_SPEED * dt;
        if (keys['ArrowRight']) player.angle += ROT_SPEED * dt;

        if (!isWall(player.x + moveX, player.y)) player.x += moveX;
        if (!isWall(player.x, player.y + moveY)) player.y += moveY;
    }

    function normalizeAngle(angle) {
        while (angle > Math.PI) angle -= Math.PI * 2;
        while (angle < -Math.PI) angle += Math.PI * 2;
        return angle;
    }

    function updateEnemies(dt) {
        const aliveEnemies = enemies.filter(e => e.state !== 'dead' && e.state !== 'dying');
        
        aliveEnemies.forEach(enemy => {
            const dx = player.x - enemy.x;
            const dy = player.y - enemy.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angleToPlayer = Math.atan2(dy, dx);
            let angleDiff = normalizeAngle(angleToPlayer - enemy.angle);
            const canSeePlayer = dist < DETECTION_RANGE && hasLineOfSight(enemy.x, enemy.y, player.x, player.y);

            if (enemy.state === 'patrol') {
                enemy.x += Math.cos(enemy.patrolDir) * 1 * dt;
                enemy.y += Math.sin(enemy.patrolDir) * 1 * dt;
                if (isWall(enemy.x + Math.cos(enemy.patrolDir) * 0.5, enemy.y + Math.sin(enemy.patrolDir) * 0.5)) {
                    enemy.patrolDir += Math.PI / 2 + Math.random() * Math.PI;
                }
                if (canSeePlayer && Math.abs(angleDiff) < DETECTION_ANGLE) {
                    enemy.state = 'chase';
                    log(`Enemy spotted player at distance ${dist.toFixed(2)}`);
                }
            } else if (enemy.state === 'chase') {
                if (dist > ENEMY_ATTACK_RANGE) {
                    enemy.angle = angleToPlayer;
                    const ex = enemy.x + Math.cos(enemy.angle) * ENEMY_SPEED * dt;
                    const ey = enemy.y + Math.sin(enemy.angle) * ENEMY_SPEED * dt;
                    if (!isWall(ex, enemy.y)) enemy.x = ex;
                    if (!isWall(enemy.x, ey)) enemy.y = ey;
                } else {
                    enemy.state = 'attack';
                }
                if (!canSeePlayer && dist > 8) {
                    enemy.state = 'patrol';
                    log('Enemy lost player, returning to patrol');
                }
            } else if (enemy.state === 'attack') {
                if (dist > ENEMY_ATTACK_RANGE + 0.5) {
                    enemy.state = 'chase';
                } else if (enemy.attackCooldown <= 0 && dist <= ENEMY_ATTACK_RANGE) {
                    enemy.attackCooldown = ENEMY_ATTACK_COOLDOWN;
                    player.health -= 10;
                    showDamageFlash();
                    log(`Enemy attacks! Player health: ${player.health}`);
                    if (player.health <= 0) {
                        showDefeat();
                    }
                }
            }

            if (enemy.attackCooldown > 0) enemy.attackCooldown -= dt;
        });
    }

    function renderSprites() {
        const sprites = [];

        enemies.forEach(enemy => {
            if (enemy.state === 'dead') return;
            const dx = enemy.x - player.x;
            const dy = enemy.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angleToEnemy = Math.atan2(dy, dx);
            let angleDiff = normalizeAngle(angleToEnemy - player.angle);
            if (Math.abs(angleDiff) < HALF_FOV + 0.2 && dist < MAX_DEPTH) {
                sprites.push({ ...enemy, dist, angleDiff, isEnemy: true });
            }
        });

        corpses.forEach(corpse => {
            const dx = corpse.x - player.x;
            const dy = corpse.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angleToCorpse = Math.atan2(dy, dx);
            const angleDiff = normalizeAngle(angleToCorpse - player.angle);
            if (Math.abs(angleDiff) < HALF_FOV + 0.2 && dist < MAX_DEPTH) {
                sprites.push({ x: corpse.x, y: corpse.y, dist, angleDiff, isEnemy: false, isCorpse: true });
            }
        });

        sprites.sort((a, b) => b.dist - a.dist);

        sprites.forEach(sprite => {
            const screenX = SCREEN_WIDTH / 2 + (sprite.angleDiff / HALF_FOV) * (SCREEN_WIDTH / 2);
            const size = Math.min(400, SCREEN_HEIGHT / sprite.dist * 0.6);
            const screenY = SCREEN_HEIGHT / 2;

            if (sprite.isCorpse) {
                ctx.fillStyle = '#440000';
                ctx.beginPath();
                ctx.arc(screenX, screenY + size * 0.3, size / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#220000';
                ctx.fillRect(screenX - size / 2, screenY, size, size / 4);
            } else if (sprite.state === 'dying') {
                sprite.dyingProgress = Math.min(1, sprite.dyingProgress + 0.02);
                const alpha = 1 - sprite.dyingProgress;
                ctx.fillStyle = `rgba(102, 0, 0, ${alpha})`;
                ctx.beginPath();
                ctx.arc(screenX, screenY, size / 2 * (1 + sprite.dyingProgress * 0.3), 0, Math.PI * 2);
                ctx.fill();
            } else {
                const color = sprite.state === 'chase' || sprite.state === 'attack' ? '#ff2222' : '#aa3333';
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(screenX, screenY, size / 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(screenX - size / 6, screenY - size / 6, size / 10, 0, Math.PI * 2);
                ctx.fill();

                if (sprite.state === 'attack') {
                    ctx.fillStyle = '#ff0000';
                    ctx.beginPath();
                    ctx.moveTo(screenX + size / 2, screenY);
                    ctx.lineTo(screenX + size / 2 + 20, screenY - 10);
                    ctx.lineTo(screenX + size / 2 + 20, screenY + 10);
                    ctx.fill();
                }
            }
        });
    }

    function showDamageFlash() {
        const flash = document.getElementById('damage-flash');
        flash.style.opacity = 1;
        setTimeout(() => flash.style.opacity = 0, 150);
    }

    function updateHUD() {
        const fill = document.getElementById('health-fill');
        fill.style.width = Math.max(0, player.health) + '%';
        fill.style.background = player.health > 50 ? '#00ff00' : player.health > 25 ? '#ffff00' : '#ff0000';
    }

    function playerAttack() {
        if (player.attackCooldown > 0) return;
        player.attackCooldown = ATTACK_COOLDOWN;

        let hitEnemy = false;
        enemies.forEach(enemy => {
            if (enemy.state === 'dying' || enemy.state === 'dead') return;
            const dx = enemy.x - player.x;
            const dy = enemy.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < ATTACK_RANGE) {
                enemy.health -= 10;
                hitEnemy = true;
                hitEffects.push({ x: enemy.x, y: enemy.y, timer: 0.3 });
                log(`Player hits enemy! Enemy health: ${enemy.health} (dist: ${dist.toFixed(2)})`);
                if (enemy.health <= 0) {
                    enemy.state = 'dying';
                    enemy.dyingProgress = 0;
                    log('Enemy entering dying state');
                }
            }
        });
    }

    function updateHitEffects(dt) {
        hitEffects = hitEffects.filter(e => {
            e.timer -= dt;
            return e.timer > 0;
        });
    }

    function renderHitEffects() {
        hitEffects.forEach(effect => {
            const dx = effect.x - player.x;
            const dy = effect.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angleToEffect = Math.atan2(dy, dx);
            const angleDiff = normalizeAngle(angleToEffect - player.angle);
            if (Math.abs(angleDiff) < HALF_FOV + 0.2 && dist < MAX_DEPTH) {
                const screenX = SCREEN_WIDTH / 2 + (angleDiff / HALF_FOV) * (SCREEN_WIDTH / 2);
                const size = Math.min(100, SCREEN_HEIGHT / dist * 0.15);
                const screenY = SCREEN_HEIGHT / 2;
                const alpha = effect.timer / 0.3;
                ctx.strokeStyle = `rgba(255, 255, 0, ${alpha})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(screenX, screenY, size, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = `rgba(255, 255, 0, ${alpha})`;
                ctx.font = `${size}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('HIT!', screenX, screenY - size - 5);
            }
        });
    }

    function checkDeadEnemies() {
        enemies.forEach(enemy => {
            if (enemy.state === 'dying' && enemy.dyingProgress >= 1) {
                enemy.state = 'dead';
                corpses.push({ x: enemy.x, y: enemy.y });
                kills++;
                document.getElementById('kills').textContent = kills;
                log(`Enemy dead. Corpses: ${corpses.length}`);
                const aliveEnemies = enemies.filter(e => e.state !== 'dead');
                if (aliveEnemies.length === 0) {
                    setTimeout(() => showVictory(), 500);
                }
            }
        });
    }

    function gameLoop(timestamp) {
        const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
        lastTime = timestamp;

        if (gameState === 'playing') {
            movePlayer(dt);
            updateEnemies(dt);
            checkDeadEnemies();
            updateHitEffects(dt);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
            renderCeiling();
            renderFloor();
            renderWalls();
            renderSprites();
            renderHitEffects();
            updateHUD();
        }
        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        parseMap();
        player.health = 100;
        player.attackCooldown = 0;
        gameState = 'playing';
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('victory').classList.add('hidden');
        document.getElementById('defeat').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('crosshair').classList.remove('hidden');
        document.getElementById('kill-count').classList.remove('hidden');
        log('Game started');
    }

    function showVictory() {
        if (gameState !== 'playing') return;
        gameState = 'victory';
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('crosshair').classList.add('hidden');
        document.getElementById('kill-count').classList.add('hidden');
        document.getElementById('victory').classList.remove('hidden');
        log('VICTORY - All enemies eliminated');
    }

    function showDefeat() {
        if (gameState !== 'playing') return;
        gameState = 'defeat';
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('crosshair').classList.add('hidden');
        document.getElementById('kill-count').classList.add('hidden');
        document.getElementById('defeat').classList.remove('hidden');
        log('DEFEAT - Player died');
    }

    function log(msg) {
        console.log(msg);
        fetch('/log', { method: 'POST', body: JSON.stringify({ msg, time: new Date().toISOString() }) }).catch(() => {});
    }

    document.addEventListener('keydown', e => {
        keys[e.code] = true;
        if (e.code === 'Space' && gameState === 'playing') {
            e.preventDefault();
            playerAttack();
        }
        if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
            e.preventDefault();
        }
    });

    document.addEventListener('keyup', e => keys[e.code] = false);

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('victoryBtn').addEventListener('click', () => { document.getElementById('victory').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden'); gameState = 'menu'; });
    document.getElementById('defeatBtn').addEventListener('click', () => { document.getElementById('defeat').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden'); gameState = 'menu'; });

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    parseMap();
    requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
